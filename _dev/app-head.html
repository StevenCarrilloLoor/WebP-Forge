<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WEBP FORGE — Convertidor WebP profesional</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='80' font-size='80'>⚡</text></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#080B14; --surface:#0F1729; --surface-2:#162040; --surface-3:#1D2A52;
  --accent:#00D4FF; --accent-2:#7C3AED;
  --ok:#10B981; --warn:#F59E0B; --err:#EF4444;
  --text:#F0F4FF; --text-2:#8892AA;
  --border:rgba(136,146,170,.18); --border-glow:rgba(0,212,255,.45);
  --glow:0 0 20px rgba(0,212,255,.3);
  --r:14px;
  --font-ui:'Inter',system-ui,sans-serif; --font-display:'Space Grotesk','Inter',sans-serif; --font-mono:'JetBrains Mono',ui-monospace,monospace;
}
*{box-sizing:border-box;margin:0;padding:0}
html{color-scheme:dark}
body{
  background:var(--bg);color:var(--text);font-family:var(--font-ui);font-size:14px;line-height:1.5;min-height:100vh;
  background-image:radial-gradient(900px 500px at 15% -10%,rgba(124,58,237,.14),transparent 60%),radial-gradient(900px 500px at 85% -10%,rgba(0,212,255,.10),transparent 60%);
  background-attachment:fixed;
}
::-webkit-scrollbar{width:9px;height:9px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--surface-3);border-radius:8px;border:2px solid var(--bg)}
::-webkit-scrollbar-thumb:hover{background:#2A3A6E}
::selection{background:rgba(0,212,255,.3)}
button{font-family:inherit;cursor:pointer}
input,select{font-family:inherit}

/* ====== HEADER ====== */
header{
  position:sticky;top:0;z-index:50;display:flex;align-items:center;gap:18px;padding:14px 26px;
  background:rgba(8,11,20,.75);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);border-bottom:1px solid var(--border);
}
.logo{display:flex;align-items:center;gap:11px}
.logo-mark{
  width:38px;height:38px;border-radius:10px;display:grid;place-items:center;font-size:19px;
  background:linear-gradient(135deg,rgba(0,212,255,.2),rgba(124,58,237,.25));border:1px solid var(--border-glow);box-shadow:var(--glow);
}
.logo h1{font-family:var(--font-display);font-size:21px;font-weight:700;letter-spacing:2.5px}
.logo h1 b{color:var(--accent);font-weight:700}
.logo small{display:block;font-size:10px;color:var(--text-2);letter-spacing:1.5px;font-weight:400}
#api-status{display:flex;gap:7px;flex-wrap:wrap;margin-left:6px}
.chip{
  display:inline-flex;align-items:center;gap:5px;padding:3px 10px;border-radius:99px;font-family:var(--font-mono);font-size:10.5px;
  background:var(--surface);border:1px solid var(--border);color:var(--text-2);cursor:default;
}
.chip.on{color:var(--ok);border-color:rgba(16,185,129,.35)}
.chip.off{color:var(--warn);border-color:rgba(245,158,11,.35)}
#global-counter{margin-left:auto;font-family:var(--font-mono);font-size:12px;color:var(--text-2);white-space:nowrap}
#global-counter b{color:var(--accent);font-weight:500}

/* ====== DROP ZONE ====== */
main{max-width:1180px;margin:0 auto;padding:26px 22px 90px}
#dropzone{
  position:relative;border:2px dashed rgba(0,212,255,.30);border-radius:20px;padding:54px 30px;text-align:center;
  background:linear-gradient(180deg,rgba(15,23,41,.6),rgba(15,23,41,.25));transition:all .3s ease;cursor:pointer;overflow:hidden;
  animation:pulse 3.2s ease-in-out infinite;
}
@keyframes pulse{0%,100%{border-color:rgba(0,212,255,.30)}50%{border-color:rgba(0,212,255,.65)}}
#dropzone.drag{
  border-color:var(--accent);border-style:solid;background:rgba(0,212,255,.07);
  box-shadow:0 0 50px rgba(0,212,255,.25),inset 0 0 80px rgba(0,212,255,.06);transform:scale(1.005);animation:none;
}
#dropzone .dz-icon{font-size:42px;margin-bottom:10px;filter:drop-shadow(0 0 14px rgba(0,212,255,.5))}
#dropzone h2{font-family:var(--font-display);font-size:22px;font-weight:500;margin-bottom:6px}
#dropzone p{color:var(--text-2);font-size:13px;margin-bottom:18px}
#dropzone .dz-buttons{display:flex;gap:12px;justify-content:center;flex-wrap:wrap}
#analyze-progress{display:none;margin-top:16px;font-family:var(--font-mono);font-size:12.5px;color:var(--accent)}

/* ====== BOTONES ====== */
.btn{
  display:inline-flex;align-items:center;gap:7px;padding:9px 18px;border-radius:10px;border:1px solid var(--border);
  background:var(--surface-2);color:var(--text);font-size:13px;font-weight:500;transition:all .3s ease;white-space:nowrap;
}
.btn:hover{border-color:var(--border-glow);box-shadow:var(--glow);transform:translateY(-1px)}
.btn:active{transform:translateY(0)}
.btn:disabled{opacity:.40;pointer-events:none}
.btn-primary{
  background:linear-gradient(135deg,#0099CC,#7C3AED);border:none;font-weight:600;font-size:14px;padding:11px 24px;
  box-shadow:0 4px 18px rgba(0,212,255,.25);
}
.btn-primary:hover{box-shadow:0 4px 28px rgba(0,212,255,.45)}
.btn-sm{padding:5px 12px;font-size:12px;border-radius:8px}
.btn-ok{border-color:rgba(16,185,129,.4);color:var(--ok)}
.btn-danger{border-color:rgba(239,68,68,.4);color:var(--err)}

/* ====== CONTROLES GLOBALES ====== */
#controls{
  display:none;flex-wrap:wrap;gap:11px;align-items:center;margin-top:20px;padding:15px 17px;
  background:rgba(15,23,41,.85);backdrop-filter:blur(10px);border:1px solid var(--border);border-radius:var(--r);
  position:sticky;top:67px;z-index:40;
}
#controls select{
  background:var(--surface-2);color:var(--text);border:1px solid var(--border);border-radius:9px;padding:8px 11px;font-size:13px;outline:none;transition:border-color .3s;
}
#controls select:focus{border-color:var(--border-glow)}
#search{
  background:var(--surface-2);color:var(--text);border:1px solid var(--border);border-radius:9px;padding:8px 12px;font-size:13px;outline:none;width:170px;transition:all .3s;
}
#search:focus{border-color:var(--border-glow);box-shadow:var(--glow)}
.spacer{flex:1}
#filters{display:none;gap:7px;flex-wrap:wrap;margin-top:13px}
.filter-chip{
  padding:5px 14px;border-radius:99px;border:1px solid var(--border);background:transparent;color:var(--text-2);font-size:12px;transition:all .3s ease;
}
.filter-chip:hover{color:var(--text);border-color:var(--border-glow)}
.filter-chip.active{background:rgba(0,212,255,.12);border-color:var(--accent);color:var(--accent)}
.filter-chip .n{font-family:var(--font-mono);font-size:10.5px;opacity:.8}

/* ====== TARJETAS ====== */
#list{margin-top:18px;display:flex;flex-direction:column;gap:11px}
.card{
  position:relative;border-radius:var(--r);border:1px solid var(--border);
  background:rgba(15,23,41,.72);backdrop-filter:blur(8px);transition:border-color .3s ease,box-shadow .3s ease,opacity .3s;
  overflow:hidden;
}
.card:hover{border-color:rgba(0,212,255,.30)}
.card.selected{border-color:rgba(0,212,255,.45);box-shadow:0 0 14px rgba(0,212,255,.12)}
.card.processing{border-color:transparent}
.card.processing::before{
  content:'';position:absolute;inset:-150%;z-index:0;
  background:conic-gradient(from 0deg,transparent 0 70%,var(--accent) 82%,var(--accent-2) 92%,transparent 100%);
  animation:spin 2.2s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg)}}
.card.processing::after{content:'';position:absolute;inset:1.5px;border-radius:12.5px;background:#0E1527;z-index:0}
.card-inner{position:relative;z-index:1;padding:14px 16px;display:flex;gap:14px;align-items:flex-start}
.card.err-card{border-color:rgba(239,68,68,.4)}
.card.done-card{border-color:rgba(16,185,129,.35)}
.sel-box{margin-top:26px;accent-color:var(--accent);width:16px;height:16px;cursor:pointer;flex-shrink:0}
.thumb{
  width:74px;height:74px;border-radius:10px;flex-shrink:0;object-fit:cover;border:1px solid var(--border);
  background:repeating-conic-gradient(#141C33 0 25%,#0D1426 0 50%) 0 0/16px 16px;
}
.thumb-skel{animation:shimmer 1.4s ease-in-out infinite}
@keyframes shimmer{0%,100%{opacity:.45}50%{opacity:1}}
.card-body{flex:1;min-width:0}
.card-top{display:flex;align-items:center;gap:9px;flex-wrap:wrap}
.fname{font-weight:600;font-size:14px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:46ch}
.badge{
  padding:2.5px 9px;border-radius:6px;font-family:var(--font-mono);font-size:10px;font-weight:500;letter-spacing:.4px;white-space:nowrap;
}
.badge.static{background:rgba(59,130,246,.16);color:#60A5FA;border:1px solid rgba(59,130,246,.35)}
.badge.anim{background:rgba(124,58,237,.18);color:#A78BFA;border:1px solid rgba(124,58,237,.4)}
.badge.video{background:rgba(245,158,11,.15);color:var(--warn);border:1px solid rgba(245,158,11,.35)}
.badge.invalid{background:rgba(239,68,68,.15);color:var(--err);border:1px solid rgba(239,68,68,.4)}
.fmeta{font-family:var(--font-mono);font-size:11px;color:var(--text-2);margin-top:3px}
.fmeta b{color:var(--text);font-weight:500}
.card-controls{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-top:10px}
.fmt-select{
  background:var(--surface-2);color:var(--text);border:1px solid var(--border);border-radius:8px;padding:6px 9px;font-size:12.5px;outline:none;font-family:var(--font-mono);
}
.q-wrap{display:flex;align-items:center;gap:7px;font-family:var(--font-mono);font-size:11px;color:var(--text-2)}
.q-wrap input[type=range]{width:110px;accent-color:var(--accent);cursor:pointer}
.progress-row{display:none;margin-top:10px;align-items:center;gap:10px}
.pbar{flex:1;height:7px;border-radius:99px;background:var(--surface-2);overflow:hidden}
.pbar-fill{
  height:100%;width:0%;border-radius:99px;background:linear-gradient(90deg,var(--accent),var(--accent-2));
  transition:width .25s ease;box-shadow:0 0 8px rgba(0,212,255,.5);
}
.ptext{font-family:var(--font-mono);font-size:11px;color:var(--accent);white-space:nowrap}
.status-line{margin-top:8px;font-size:12px;display:none}
.status-line.ok{color:var(--ok)}
.status-line.error{color:var(--err)}
.result-row{display:none;margin-top:10px;gap:8px;flex-wrap:wrap;align-items:center}
.savings{font-family:var(--font-mono);font-size:11px;color:var(--text-2)}
.savings .pos{color:var(--ok)} .savings .neg{color:var(--warn)}
details.stack{margin-top:6px;font-size:11px;color:var(--text-2)}
details.stack pre{
  font-family:var(--font-mono);font-size:10px;background:#0A0F1E;border:1px solid var(--border);border-radius:8px;
  padding:8px;margin-top:5px;white-space:pre-wrap;max-height:120px;overflow:auto;
}
.card-x{
  position:absolute;top:9px;right:11px;z-index:2;background:none;border:none;color:var(--text-2);font-size:15px;
  padding:3px 7px;border-radius:7px;transition:all .3s;
}
.card-x:hover{color:var(--err);background:rgba(239,68,68,.12)}

/* ====== STATS PANEL ====== */
#stats{
  position:fixed;right:18px;bottom:18px;z-index:60;min-width:215px;padding:13px 16px;border-radius:13px;
  background:rgba(15,23,41,.92);backdrop-filter:blur(12px);border:1px solid var(--border-glow);box-shadow:var(--glow);
  font-family:var(--font-mono);font-size:11.5px;display:none;
}
#stats h4{font-family:var(--font-display);font-size:12px;letter-spacing:1.2px;color:var(--accent);margin-bottom:7px}
#stats div{display:flex;justify-content:space-between;gap:14px;color:var(--text-2);padding:1.5px 0}
#stats b{color:var(--text);font-weight:500}

/* ====== MODAL ====== */
#modal{
  position:fixed;inset:0;z-index:100;display:none;align-items:center;justify-content:center;padding:26px;
  background:rgba(4,6,12,.82);backdrop-filter:blur(8px);
}
#modal.open{display:flex}
.modal-box{
  background:var(--surface);border:1px solid var(--border-glow);border-radius:18px;box-shadow:0 0 60px rgba(0,212,255,.18);
  max-width:1020px;width:100%;max-height:92vh;overflow:auto;padding:22px;
}
.modal-head{display:flex;align-items:center;gap:12px;margin-bottom:16px}
.modal-head h3{font-family:var(--font-display);font-size:17px;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.compare{display:grid;grid-template-columns:1fr 1fr;gap:15px}
@media (max-width:760px){.compare{grid-template-columns:1fr}}
.compare .pane{background:#0A0F1E;border:1px solid var(--border);border-radius:12px;padding:12px;text-align:center}
.pane h5{font-family:var(--font-mono);font-size:11px;color:var(--text-2);letter-spacing:1px;margin-bottom:9px}
.pane img,.pane video{
  max-width:100%;max-height:54vh;border-radius:8px;
  background:repeating-conic-gradient(#141C33 0 25%,#0D1426 0 50%) 0 0/18px 18px;
}
.pane .sz{font-family:var(--font-mono);font-size:11.5px;margin-top:9px;color:var(--text-2)}
.pane .sz b{color:var(--accent)}

/* ====== TOASTS ====== */
#toasts{position:fixed;left:50%;transform:translateX(-50%);bottom:22px;z-index:120;display:flex;flex-direction:column;gap:9px;align-items:center}
.toast{
  padding:10px 20px;border-radius:11px;background:var(--surface-2);border:1px solid var(--border-glow);
  box-shadow:var(--glow);font-size:13px;animation:toastIn .3s ease;max-width:560px;
}
.toast.warn{border-color:rgba(245,158,11,.5);box-shadow:0 0 18px rgba(245,158,11,.2)}
.toast.err{border-color:rgba(239,68,68,.55);box-shadow:0 0 18px rgba(239,68,68,.22)}
@keyframes toastIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.fade-out{opacity:0;transition:opacity .4s}

#empty-filter{display:none;text-align:center;color:var(--text-2);padding:34px;font-size:13px}
kbd{
  font-family:var(--font-mono);font-size:10px;background:var(--surface-2);border:1px solid var(--border);
  border-bottom-width:2px;border-radius:5px;padding:1px 6px;color:var(--text-2);
}
footer{margin-top:34px;text-align:center;color:var(--text-2);font-size:11.5px}
footer .keys{margin-top:6px}
@media (max-width:720px){
  header{padding:10px 14px;flex-wrap:wrap}
  #global-counter{width:100%;margin-left:0}
  #controls{position:static}
  .fname{max-width:24ch}
}
</style>
</head>
